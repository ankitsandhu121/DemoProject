name: Regression Nightly QA

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  workflow_run:
    workflows:
      - Deploy to QA
    types:
      - completed

jobs:
  regression:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      QA_BASE_URL: ${{ secrets.QA_BASE_URL }}
      QA_API_URL: ${{ secrets.QA_API_URL }}
      API_BASE_URL: ${{ secrets.QA_API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Require QA base URL
        shell: bash
        run: |
          if [ -z "$QA_BASE_URL" ]; then
            echo "QA_BASE_URL secret is required for regression tests."
            exit 1
          fi

      - name: Run regression tests
        run: npx playwright test --config=e2e/regression/playwright.config.ts

      - name: Healer note on failure
        if: failure()
        run: |
          echo "Regression failed. Run the regression-healer agent, open a PR with any fixes, and never commit directly to the protected branch."
